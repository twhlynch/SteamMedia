<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Media</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
	<div id="zones">
		<div id="drop-zone">
			<p>Drop a <strong>background</strong> image here, or click to select one.</p>
			<input type="file" id="bg-input" accept="image/*">
		</div>
		<div id="logo-zone">
			<p>Drop a <strong>logo</strong> image here, or click to select one.</p>
			<input type="file" id="logo-input" accept="image/*">
		</div>
	</div>
	<div id="top-section">
		<input type="range" min="0.1" max="1" step="0.01" value="0.6" id="main-scale" class="scale">
		<button id="reset-btn">Reset</button>
		<button id="download-all">Download All</button>
	</div>
    <div id="previews"></div>
</body>
</html>
